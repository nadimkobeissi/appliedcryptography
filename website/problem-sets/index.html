<html>

<head>
	<title>Applied Cryptography: Problem Sets Redirector</title>
	<script>
		window.addEventListener(`load`, () => {
			const anchor = window.location.hash.substring(1);
			if (anchor && /^\d$/.test(anchor)) {
				setTimeout(() => {
					const redirectUrl = `https://github.com/nadimkobeissi/appliedcryptography/blob/main/materials/problem-sets/pdf/problem-set-${anchor}.pdf`;
					window.location.href = redirectUrl;
				}, 1000);
			}
		});
	</script>
</head>

<body style="background-color: #f6f9f1">
	<img src="/img/waiting.gif" alt="" style="
				display: block;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -60%);
				width: 50vw;
				max-width: 300px;
				image-rendering: pixelated;
				image-rendering: crisp-edges;
				image-rendering: -moz-crisp-edges;
				image-rendering: -webkit-crisp-edges;
			" />
</body>

</html>
